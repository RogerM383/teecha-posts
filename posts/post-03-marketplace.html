<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: linear-gradient(160deg, #EEF2FF 0%, #F5F0FF 100%);
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 64px 80px 0;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      position: relative;
    }

    .divider {
      display: none;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: #7C3AED;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      margin-top: 0;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 46px;
      line-height: 1.12;
      color: #0F172A;
      margin-bottom: 36px;
      letter-spacing: -1px;
    }

    h1 em {
      font-style: normal;
      color: #7C3AED;
    }

    .sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 26px;
      color: #475569;
      line-height: 1.55;
      margin-bottom: 36px;
    }

    .url {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 22px;
      color: #7C3AED;
      margin-bottom: 32px;
    }

    .mock {
      width: 420px;
      display: block;
      /* Deja que sobresalga por abajo a sangre */
      margin: 0 auto;
      filter: drop-shadow(0 16px 40px rgba(124,58,237,0.18));
    }
  </style>
</head>
<body>

  <h1>El marketplace de la<br><em>formación en directo.</em></h1>

  <img class="mock" src="images/mesa-de-trabajo.png" alt="App Teecha">

</body>
</html>
