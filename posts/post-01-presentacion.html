<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teecha — Post 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(180deg, #EEF2FF 0%, #F5F0FF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas {
      width: 800px;
      height: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 0;
    }

    .logo {
      height: 56px;
      width: auto;
      margin-bottom: 28px;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: #7C3AED;
      opacity: 0.35;
      border-radius: 2px;
      margin-bottom: 52px;
    }

    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 48px;
      line-height: 1.18;
      color: #0F172A;
      text-align: center;
      max-width: 860px;
      margin-bottom: 36px;
    }

    .subtext {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 23px;
      line-height: 1.5;
      color: #64748B;
      text-align: center;
      max-width: 780px;
      margin-bottom: 52px;
    }

    .url {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 18px;
      color: #7C3AED;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">
    <div class="divider"></div>
    <h1 class="headline">Enseña en directo,<br>conecta con tus alumnos.</h1>
    <p class="subtext">Sin intermediarios · Sin vídeos grabados<br>Solo tú y tus alumnos</p>
    <span class="url">teecha.app/formadores</span>
  </div>
</body>
</html>
