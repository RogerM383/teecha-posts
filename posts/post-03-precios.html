<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 80px;
      font-family: 'DM Sans', sans-serif;
    }

    /* Logo arriba */
    .logo {
      height: 40px;
      width: auto;
      margin-bottom: 52px;
    }

    /* Precio de venta */
    .precio-venta {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 100px;
      line-height: 1;
      color: #7C3AED;
      letter-spacing: -2px;
    }

    .label-venta {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 20px;
      color: #64748B;
      margin-top: 10px;
      margin-bottom: 36px;
    }

    /* Separador */
    .sep {
      width: 60px;
      height: 2px;
      background: #E2E8F0;
      border-radius: 2px;
      margin-bottom: 36px;
    }

    /* Precio que cobras */
    .precio-cobras {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      color: #CBD5E1;
      letter-spacing: -1px;
    }

    .label-cobras {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 20px;
      color: #94A3B8;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .label-suerte {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 16px;
      color: #CBD5E1;
      font-style: italic;
      margin-bottom: 52px;
    }

    /* Tagline final */
    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: #0F172A;
      text-align: center;
      line-height: 1.5;
    }

    .tagline span {
      color: #7C3AED;
    }
  </style>
</head>
<body>

  <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">

  <div class="precio-venta">200€</div>
  <div class="label-venta">precio de tu curso en la academia</div>

  <div class="sep"></div>

  <div class="precio-cobras">40€</div>
  <div class="label-cobras">lo que ves tú</div>
  <div class="label-suerte">si tienes suerte</div>

  <p class="tagline">Hay una alternativa. <span>teecha.app/formadores</span></p>

</body>
</html>
