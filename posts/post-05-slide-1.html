<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 5 / Slide 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: #0F172A;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    .tag {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 24px;
      color: #7C3AED;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 36px;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 58px;
      line-height: 1.1;
      color: #fff;
      letter-spacing: -1.5px;
      margin-bottom: 36px;
    }

    h1 em {
      font-style: normal;
      color: #7C3AED;
    }

    .hint {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 24px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.02em;
    }

<body>
  <p class="tag">Para formadores</p>
  <h1>Tu mejor formación<br>no cabe en<br><em>un vídeo.</em></h1>
