<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha LinkedIn — Slide 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #0F172A;
      box-shadow: 0 8px 48px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 88px;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      height: 80px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    .slide-num {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.06em;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-size: 22px;
      font-weight: 600;
      color: #7C3AED;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 28px;
    }

    h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 72px;
      line-height: 1.06;
      color: #fff;
      letter-spacing: -2.5px;
      margin-bottom: 52px;
    }

    h2 em {
      font-style: normal;
      background: linear-gradient(90deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px 24px;
    }

    .feature-icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }

    .feature-text {
      font-size: 26px;
      color: rgba(255,255,255,0.82);
      font-weight: 500;
      line-height: 1.3;
    }

    .feature-text strong {
      color: #fff;
      font-weight: 600;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .kicker {
      font-size: 22px;
      color: rgba(255,255,255,0.40);
      line-height: 1.5;
    }

    .hint {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="top">
    <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">
    <span class="slide-num">4 / 6</span>
  </div>

  <div class="middle">
    <p class="eyebrow">Tu aula digital</p>
    <h2>Todo lo que necesitas<br>ya está <em>incluido.</em></h2>
    <div class="feature-list">
      <div class="feature-item">
        <span class="feature-icon">🎥</span>
        <span class="feature-text"><strong>Streaming en directo</strong> con tus alumnos</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">💬</span>
        <span class="feature-text"><strong>Chat en tiempo real</strong> durante la clase</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">📎</span>
        <span class="feature-text"><strong>Comparte materiales</strong> al momento</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">📝</span>
        <span class="feature-text"><strong>Transcripción automática</strong> de cada sesión</span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <p class="kicker">Sin configurar nada. Sin herramientas externas.</p>
    <span class="hint">Desliza →</span>
  </div>

</body>
</html>
