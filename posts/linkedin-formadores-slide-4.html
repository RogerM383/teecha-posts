<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha LinkedIn — Slide 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: linear-gradient(150deg, #16103A 0%, #1D2A6E 45%, #2D1B6E 100%);
      box-shadow: 0 8px 48px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 88px;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }

    body::after {
      content: '';
      position: absolute;
      top: -150px;
      right: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.22) 0%, transparent 65%);
      pointer-events: none;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .logo {
      height: 40px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    .slide-num {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.30);
      letter-spacing: 0.06em;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 28px;
    }

    h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 72px;
      line-height: 1.06;
      color: #fff;
      letter-spacing: -2.5px;
      margin-bottom: 52px;
    }

    h2 .accent {
      background: linear-gradient(90deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pills {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 100px;
      padding: 14px 26px;
      font-size: 21px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .sub {
      font-size: 22px;
      color: rgba(255,255,255,0.42);
      line-height: 1.5;
    }

    .hint {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.30);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="top">
    <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">
    <span class="slide-num">4 / 5</span>
  </div>

  <div class="middle">
    <p class="eyebrow">En Teecha</p>
    <h2>Tus condiciones.<br>Tu horario.<br><span class="accent">Tu aula.</span></h2>
    <div class="pills">
      <div class="pill">🎯 Clases en directo</div>
      <div class="pill">🗓️ Tu horario</div>
      <div class="pill">👤 Tus alumnos</div>
      <div class="pill">💼 Mejores condiciones que en una academia</div>
    </div>
  </div>

  <div class="bottom">
    <p class="sub">Sin que nadie decida por ti<br>cómo, cuándo y cuánto enseñas.</p>
    <span class="hint">Desliza →</span>
  </div>

</body>
</html>
