<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 12</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: #7C3AED;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 64px;
      font-family: 'DM Sans', sans-serif;
    }

    .eyebrow {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.60);
      margin-bottom: 28px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-bottom: 36px;
    }

    .pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-blue   { background: #60A5FA; }
    .dot-green  { background: #34D399; }
    .dot-orange { background: #FBBF24; }
    .dot-white  { background: rgba(255,255,255,0.55); }

    .pill-text {
      font-weight: 500;
      font-size: 24px;
      color: #fff;
      line-height: 1.2;
    }

    .tagline {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255,255,255,0.70);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .footer-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo {
      height: 38px;
      filter: brightness(0) invert(1);
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <div class="eyebrow">Teecha es para ti si eres…</div>

  <div class="grid">
    <div class="pill"><div class="pill-dot dot-blue"></div><span class="pill-text">Coach o mentor</span></div>
    <div class="pill"><div class="pill-dot dot-green"></div><span class="pill-text">Formador de idiomas</span></div>
    <div class="pill"><div class="pill-dot dot-orange"></div><span class="pill-text">Consultor de empresa</span></div>
    <div class="pill"><div class="pill-dot dot-white"></div><span class="pill-text">Terapeuta o psicólogo</span></div>
    <div class="pill"><div class="pill-dot dot-blue"></div><span class="pill-text">Profesor particular</span></div>
    <div class="pill"><div class="pill-dot dot-orange"></div><span class="pill-text">Experto en marketing</span></div>
    <div class="pill"><div class="pill-dot dot-green"></div><span class="pill-text">Formador de soft skills</span></div>
    <div class="pill"><div class="pill-dot dot-white"></div><span class="pill-text">Especialista técnico</span></div>
  </div>

  <div class="tagline">Si tienes conocimiento y alumnos que lo quieren,<br>aquí tienes tu aula.</div>

  <div class="footer-row">
    <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">
  </div>

</body>
</html>
