<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 17</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: linear-gradient(145deg, #4655E8 0%, #6B35E8 55%, #8228E2 100%);
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
    }

    .logo {
      height: 68px;
      filter: brightness(0) invert(1);
      margin-bottom: 32px;
    }

    .urgency-pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 100px;
      padding: 8px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 72px;
      color: #fff;
      line-height: 1.0;
      letter-spacing: -2px;
      text-align: center;
      margin-bottom: 20px;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 26px;
      color: rgba(255,255,255,0.70);
      line-height: 1.55;
      text-align: center;
      max-width: 520px;
      margin-bottom: 40px;
    }

    .cta-pill {
      background: #fff;
      border-radius: 100px;
      padding: 16px 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 24px;
      color: #6B35E8;
      box-shadow: 0 4px 24px rgba(0,0,0,0.20);
      margin-bottom: 36px;
    }

    .cta-arrow {
      font-size: 26px;
    }

    .url {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.50);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">

  <div class="urgency-pill">
    ⏱ Lista de espera · Junio 2026
  </div>

  <div class="headline">La lista se<br>cierra pronto.</div>

  <div class="subtitle">Regístrate gratis ahora y empieza a enseñar antes de que acabe el verano.</div>

  <div class="cta-pill">
    <span class="cta-arrow">→</span>
    Unirme a la lista de espera
  </div>

  <div class="url">teecha.app/formadores</div>

</body>
</html>
