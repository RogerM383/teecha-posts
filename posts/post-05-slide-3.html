<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 5 / Slide 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: #0F172A;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    .logo {
      height: 44px;
      width: auto;
      margin-bottom: 48px;
      filter: brightness(0) invert(1);
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 48px;
      line-height: 1.12;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }

    h1 em {
      font-style: normal;
      color: #7C3AED;
    }

    .pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }

    .pill {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 17px;
      color: rgba(255,255,255,0.65);
    }

    .pill.yes {
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.4);
      color: #C4B5FD;
    }

    .url {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 17px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">

  <h1>Da clase el martes.<br>Con lo que<br><em>ya tienes.</em></h1>

  <div class="pills">
    <span class="pill yes">Tu conocimiento</span>
    <span class="pill yes">Tus materiales</span>
    <span class="pill yes">Clase en directo</span>
    <span class="pill">Sin editar vídeo</span>
    <span class="pill">Sin producción</span>
    <span class="pill">Sin ceder la mitad</span>
  </div>

  <span class="url">teecha.app/formadores</span>
</body>
</html>
