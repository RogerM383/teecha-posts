<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 16</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      position: relative;
      background: #0F172A;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }

    .half {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .half-left {
      background: #0F172A;
      clip-path: polygon(0 0, 53% 0, 47% 100%, 0 100%);
    }

    .half-right {
      background: linear-gradient(155deg, #1D4ED8 0%, #2563EB 30%, #7C3AED 100%);
      clip-path: polygon(53% 0, 100% 0, 100% 100%, 47% 100%);
    }

    .divider {
      position: absolute;
      left: calc(50% - 1.5px);
      top: 0;
      width: 3px;
      height: 100%;
      background: rgba(255,255,255,0.18);
      transform-origin: center center;
      transform: skewX(3.4deg);
      z-index: 10;
    }

    /* Left: perfil */
    .content-left {
      position: absolute;
      left: 52px;
      top: 50%;
      transform: translateY(-50%);
      max-width: 290px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 34px;
      color: rgba(255,255,255,0.80);
    }

    .profile-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 24px;
      color: #fff;
    }

    .profile-role {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: rgba(255,255,255,0.50);
      line-height: 1.4;
    }

    .profile-location {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 24px;
      color: rgba(255,255,255,0.30);
    }

    /* Right: cita */
    .content-right {
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      width: 295px;
      z-index: 20;
    }

    .quote-mark {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 80px;
      color: rgba(255,255,255,0.12);
      line-height: 0.8;
      display: block;
      margin-bottom: 10px;
    }

    .quote-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 36px;
      color: #fff;
      line-height: 1.12;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .quote-sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 22px;
      color: rgba(255,255,255,0.58);
      line-height: 1.55;
    }

    .logo {
      position: absolute;
      bottom: 44px;
      right: 44px;
      height: 34px;
      filter: brightness(0) invert(1);
      opacity: 0.55;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div class="half half-left"></div>
  <div class="half half-right"></div>
  <div class="divider"></div>

  <!-- Left: perfil -->
  <div class="content-left">
    <div class="avatar">MR</div>
    <div class="profile-name">María R.</div>
    <div class="profile-role">Formadora de<br>comunicación</div>
    <div class="profile-location">Madrid</div>
  </div>

  <!-- Right: cita -->
  <div class="content-right">
    <span class="quote-mark">"</span>
    <div class="quote-text">Antes trabajaba para la academia.<br>Ahora trabajo para mí.</div>
    <div class="quote-sub">Con Teecha cobro lo que decido, enseño como quiero y mis alumnos son míos.</div>
  </div>

  <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">

</body>
</html>
