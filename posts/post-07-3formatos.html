<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: #7C3AED;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px;
      font-family: 'DM Sans', sans-serif;
    }

    /* Headline con logo inline */
    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 38px;
      color: #fff;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    h1 .logo-inline {
      height: 68px;
      width: auto;
      filter: brightness(0) invert(1);
      display: block;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .card {
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 22px 26px;
      display: flex;
      align-items: center;
      gap: 22px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* Badge cuadrado con icono arriba y texto abajo */
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 96px;
      height: 96px;
      border-radius: 18px;
      flex-shrink: 0;
      color: white;
    }

    .badge-curso  { background: linear-gradient(135deg, #3B82F6, #6D28D9); }
    .badge-sala   { background: linear-gradient(135deg, #10B981, #0D9488); }
    .badge-master { background: linear-gradient(135deg, #F59E0B, #F97316); }

    .badge svg {
      width: 34px;
      height: 34px;
    }

    .badge-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: rgba(255,255,255,0.90);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Texto de la card */
    .card-text {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-title {
      font-weight: 600;
      font-size: 27px;
      color: #fff;
      line-height: 1.2;
    }

    .card-desc {
      font-weight: 400;
      font-size: 22px;
      color: rgba(255,255,255,0.68);
      line-height: 1.45;
    }
  </style>
</head>
<body>

  <h1>
    Elige cómo enseñar en
    <img class="logo-inline" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">
  </h1>

  <div class="cards">

    <!-- CURSO -->
    <div class="card">
      <div class="badge badge-curso">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span class="badge-label">Curso</span>
      </div>
      <div class="card-text">
        <span class="card-title">Formación estructurada</span>
        <span class="card-desc">Sesiones en directo con varias ediciones y alumnos propios.</span>
      </div>
    </div>

    <!-- SALA EN VIVO -->
    <div class="card">
      <div class="badge badge-sala">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="badge-label">Sala en vivo</span>
      </div>
      <div class="card-text">
        <span class="card-title">Tu aula recurrente</span>
        <span class="card-desc">Misma hora, cada semana. Comunidad real en directo.</span>
      </div>
    </div>

    <!-- MASTERCLASS -->
    <div class="card">
      <div class="badge badge-master">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span class="badge-label">Masterclass</span>
      </div>
      <div class="card-text">
        <span class="card-title">Una sesión intensiva</span>
        <span class="card-desc">Un tema, un día, un precio. Sin compromiso.</span>
      </div>
    </div>

  </div>

</body>
</html>
