<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teecha — Post 9</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
      background: linear-gradient(145deg, #4655E8 0%, #6B35E8 55%, #8228E2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
    }

    .logo {
      height: 58px;
      filter: brightness(0) invert(1);
      margin-bottom: 28px;
    }

    .divider {
      width: 44px;
      height: 1.5px;
      background: rgba(255,255,255,0.35);
      margin-bottom: 48px;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 58px;
      line-height: 1.05;
      color: #fff;
      text-align: center;
      letter-spacing: -1px;
      margin-bottom: 28px;
      white-space: nowrap;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 22px;
      line-height: 1.55;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .url {
      position: absolute;
      bottom: 52px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <img class="logo" src="https://teecha.app/images/teecha-horizontal.png" alt="Teecha">
  <div class="divider"></div>
  <h1>¿Eres formador?</h1>
  <p class="subtitle">Regístrate gratis.<br>Sé de los primeros.</p>
  <span class="url">teecha.app/formadores</span>

</body>
</html>
